<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 380 380" role="img">
  <title>gh/dash</title>
  <desc>Multi-repo commander icon — eight amber squares ringed around a diagonal baton, with the numerals 3 and 8 flanking it.</desc>

  <rect x="0" y="0" width="380" height="380" fill="#fafaf7"/>

  <g transform="translate(190 190)">
    <rect x="-14" y="-116" width="28" height="28" rx="3" fill="#d99a3f" opacity="0.45"/>
    <rect x="60"  y="-90"  width="28" height="28" rx="3" fill="#d99a3f" opacity="0.6"/>
    <rect x="95"  y="-14"  width="28" height="28" rx="3" fill="#d99a3f" opacity="0.75"/>
    <rect x="60"  y="62"   width="28" height="28" rx="3" fill="#d99a3f" opacity="0.6"/>
    <rect x="-14" y="88"   width="28" height="28" rx="3" fill="#d99a3f" opacity="0.45"/>
    <rect x="-88" y="62"   width="28" height="28" rx="3" fill="#d99a3f" opacity="0.6"/>
    <rect x="-123" y="-14" width="28" height="28" rx="3" fill="#d99a3f" opacity="0.75"/>
    <rect x="-88" y="-90"  width="28" height="28" rx="3" fill="#d99a3f" opacity="0.6"/>

    <line x1="-70" y1="70" x2="70" y2="-70" stroke="#b8701a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-70" cy="70" r="12" fill="#b8701a"/>
    <circle cx="70" cy="-70" r="6" fill="#d99a3f"/>

    <text x="-50" y="-18" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="400" font-style="italic" fill="#2a1d0d" text-anchor="middle">3</text>
    <text x="50" y="45" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="400" font-style="italic" fill="#2a1d0d" text-anchor="middle">8</text>
  </g>
</svg>
